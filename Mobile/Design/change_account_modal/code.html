<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d59f2",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<!-- Background Screen (Settings SCREEN_4) - Dimmed/Blurred -->
<div class="fixed inset-0 z-0 overflow-y-auto filter blur-sm grayscale-[20%] opacity-60">
<header class="flex items-center justify-between px-6 py-4 bg-white dark:bg-background-dark/50 border-b border-primary/10">
<h1 class="text-xl font-bold text-slate-900 dark:text-slate-100">Settings</h1>
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">notifications</span>
</header>
<div class="p-6 space-y-6">
<div class="flex items-center gap-4 p-4 bg-white dark:bg-slate-800 rounded-xl shadow-sm">
<div class="w-16 h-16 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">person</span>
</div>
<div>
<h3 class="font-bold text-slate-900 dark:text-slate-100">Alex Johnson</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">alex.j@example.com</p>
</div>
</div>
<div class="space-y-2">
<p class="text-xs font-bold uppercase tracking-wider text-slate-400">Account</p>
<div class="bg-white dark:bg-slate-800 rounded-xl divide-y divide-slate-100 dark:divide-slate-700">
<div class="p-4 flex justify-between items-center">
<span class="text-slate-900 dark:text-slate-100">Security</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
<div class="p-4 flex justify-between items-center">
<span class="text-slate-900 dark:text-slate-100">Privacy</span>
<span class="material-symbols-outlined text-slate-400">chevron_right</span>
</div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/60 backdrop-blur-sm">
<!-- BottomSheet/Modal Content -->
<div class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-t-3xl sm:rounded-3xl shadow-2xl overflow-hidden">
<!-- Handle for mobile -->
<div class="flex h-6 w-full items-center justify-center sm:hidden">
<div class="h-1.5 w-12 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<div class="px-6 py-4 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
<button class="p-2 -ml-2 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-lg font-bold text-slate-900 dark:text-slate-100">Update Profile</h2>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<div class="p-6 space-y-8">
<!-- Change Photo Section -->
<div class="flex flex-col items-center gap-4">
<div class="relative group">
<div class="size-32 rounded-full ring-4 ring-primary/10 overflow-hidden bg-primary/5 flex items-center justify-center">
<img alt="User avatar" class="w-full h-full object-cover" data-alt="Professional headshot of a smiling young man" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGK1m1225dNT3-bGpxPFjICOADfHMqc_N5ugiifZGHt3rkCU6ZHAcXJeRva1coW6PNK6VUyqeIHAU4RRjCaARUw1yWUThjb3ZGcyj1TCGBxtUZUX4qz8fzJDanEj_FfrGeO0uRpRDhb0NKCIWdrBQbSvgBiX6przHYtgbVT1BpZ6JfOn_xWktKPdleyR-CBN7jq7FOdwLrpkqY-qG3kTPt8j6bY6r6Js-rwhF7QLErlUztlSZ8-vbBnKtTnxhT4YldBiTvCa9P9Vw"/>
</div>
<button class="absolute bottom-0 right-0 size-10 bg-primary text-white rounded-full flex items-center justify-center shadow-lg border-4 border-white dark:border-slate-900 hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-lg">photo_camera</span>
</button>
</div>
<button class="text-sm font-semibold text-primary hover:text-primary/80 transition-colors">
                        Change Profile Photo
                    </button>
</div>
<!-- Form Fields -->
<div class="space-y-5">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-800 border-none rounded-xl text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-slate-400" placeholder="Enter your full name" type="text" value="Alex Johnson"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-800 border-none rounded-xl text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 transition-all placeholder:text-slate-400" placeholder="Enter your email" type="email" value="alex.j@example.com"/>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 pt-4 pb-2">
<button class="w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/25 hover:bg-primary/90 transition-all active:scale-[0.98]">
                        Save Changes
                    </button>
<button class="w-full py-4 text-slate-500 dark:text-slate-400 font-bold hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                        Cancel
                    </button>
</div>
</div>
</div>
</div>
</body></html>
