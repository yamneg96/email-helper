<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#0d59f2",
              "background-light": "#f5f6f8",
              "background-dark": "#101622",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<title>Email Assistant Loading</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<div class="flex items-center bg-white dark:bg-slate-900/50 p-4 border-b border-primary/10 justify-between">
<div class="text-primary flex size-10 items-center justify-center">
<span class="material-symbols-outlined text-2xl">menu</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Email Assistant</h2>
</div>
<!-- Main Content Area (Skeleton) -->
<div class="flex-1 flex flex-col p-4 gap-4 overflow-hidden">
<!-- Large Featured Skeleton -->
<div class="@container">
<div class="@[480px]:px-0">
<div class="w-full bg-slate-200 dark:bg-slate-800 rounded-xl min-h-[180px] animate-pulse relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 dark:via-white/5 to-transparent -translate-x-full animate-[shimmer_2s_infinite]"></div>
</div>
</div>
</div>
<!-- Progress Indicator -->
<div class="flex flex-col gap-3 py-4">
<div class="flex gap-6 justify-between items-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-medium leading-normal">Syncing your inbox...</p>
<p class="text-primary text-sm font-bold">64%</p>
</div>
<div class="rounded-full bg-primary/10 h-2.5 w-full overflow-hidden">
<div class="h-full rounded-full bg-primary" style="width: 64%;"></div>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-normal">Getting things ready...</p>
</div>
<!-- Skeleton List -->
<div class="flex flex-col gap-6">
<!-- Skeleton Item 1 -->
<div class="flex items-center gap-4 bg-white/50 dark:bg-slate-800/30 rounded-xl p-3 animate-pulse">
<div class="bg-slate-200 dark:bg-slate-700 aspect-square rounded-full size-12 shrink-0"></div>
<div class="flex flex-col flex-1 gap-2">
<div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-3/4"></div>
<div class="h-3 bg-slate-100 dark:bg-slate-800 rounded w-1/2"></div>
</div>
<div class="shrink-0 h-3 bg-slate-100 dark:bg-slate-800 rounded w-8"></div>
</div>
<!-- Skeleton Item 2 -->
<div class="flex items-center gap-4 bg-white/50 dark:bg-slate-800/30 rounded-xl p-3 animate-pulse">
<div class="bg-slate-200 dark:bg-slate-700 aspect-square rounded-full size-12 shrink-0"></div>
<div class="flex flex-col flex-1 gap-2">
<div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-2/3"></div>
<div class="h-3 bg-slate-100 dark:bg-slate-800 rounded w-3/4"></div>
</div>
<div class="shrink-0 h-3 bg-slate-100 dark:bg-slate-800 rounded w-8"></div>
</div>
<!-- Skeleton Item 3 -->
<div class="flex items-center gap-4 bg-white/50 dark:bg-slate-800/30 rounded-xl p-3 animate-pulse opacity-60">
<div class="bg-slate-200 dark:bg-slate-700 aspect-square rounded-full size-12 shrink-0"></div>
<div class="flex flex-col flex-1 gap-2">
<div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-1/2"></div>
<div class="h-3 bg-slate-100 dark:bg-slate-800 rounded w-2/3"></div>
</div>
<div class="shrink-0 h-3 bg-slate-100 dark:bg-slate-800 rounded w-8"></div>
</div>
<!-- Skeleton Item 4 -->
<div class="flex items-center gap-4 bg-white/50 dark:bg-slate-800/30 rounded-xl p-3 animate-pulse opacity-30">
<div class="bg-slate-200 dark:bg-slate-700 aspect-square rounded-full size-12 shrink-0"></div>
<div class="flex flex-col flex-1 gap-2">
<div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-4/5"></div>
<div class="h-3 bg-slate-100 dark:bg-slate-800 rounded w-1/2"></div>
</div>
<div class="shrink-0 h-3 bg-slate-100 dark:bg-slate-800 rounded w-8"></div>
</div>
</div>
</div>
<!-- Branding Footer (Subtle) -->
<div class="flex flex-col items-center justify-center pb-8 pt-4 gap-2">
<div class="text-primary/40">
<span class="material-symbols-outlined text-3xl">smart_assistant</span>
</div>
<p class="text-slate-400 dark:text-slate-500 text-xs font-medium tracking-widest uppercase">Powered by AI</p>
</div>
<!-- Navigation Bar -->
<div class="mt-auto border-t border-primary/5 bg-white dark:bg-slate-900 px-4 pb-6 pt-3 flex gap-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">inbox</span>
</div>
<p class="text-xs font-semibold leading-normal">Inbox</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<p class="text-xs font-medium leading-normal">Assistant</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</div>
<p class="text-xs font-medium leading-normal">Settings</p>
</a>
</div>
</div>
<style>
    @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }
    .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
    }
</style>
</body></html>
