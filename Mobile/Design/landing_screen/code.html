<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Email Assistant - Welcome</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#0d59f2',
              'background-light': '#f5f6f8',
              'background-dark': '#101622',
            },
            fontFamily: {
              display: ['Inter', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div
      class="bg-background-light dark:bg-background-dark group/design-root relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
      <!-- Top App Bar -->
      <div
        class="bg-background-light dark:bg-background-dark sticky top-0 z-10 flex items-center justify-between p-4 pb-2">
        <div class="w-10"></div>
        <!-- Spacer for balance -->
        <h2
          class="flex-1 text-center text-lg font-bold leading-tight tracking-[-0.015em] text-slate-900 dark:text-slate-100">
          Email Assistant
        </h2>
        <div class="flex w-10 items-center justify-end">
          <span class="material-symbols-outlined cursor-pointer text-slate-900 dark:text-slate-100"
            >help_outline</span
          >
        </div>
      </div>
      <!-- Hero Section -->
      <div class="flex flex-1 flex-col">
        <div class="@container">
          <div class="@[480px]:px-4 @[480px]:py-3">
            <div
              class="@[480px]:rounded-xl flex min-h-[400px] w-full flex-col justify-end overflow-hidden bg-slate-200 bg-cover bg-center bg-no-repeat shadow-sm transition-all dark:bg-slate-800"
              data-alt="Modern abstract illustration of digital mail and communication connectivity"
              style="
                background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCHjj9QqcpEHi9lU8Xoa7MwC-jWjfrk35s1F-hzMV69Zp_7vuvWTPnuLTrkh90fa3H6qgT5IJ-VW8dlokjBInhY9Dm2XS8GW5NtWGnKLTtwfj-Sq6VWAZIrtUg0dny8OhDih2MHvpo0WxxfLYBqfhpsyyyejREEKoUD2xNBAHjvkyPVE9yQ1D8b4LpdrbbFwS_8xsB27pVn5-xo5Av5sujbs-y-Ka0xpbt0nk3es9Ps7seZ2gVdd4XDiDlcJIeamOjoBYe5AJ2e-jw');
              "></div>
          </div>
        </div>
        <!-- Content -->
        <div class="mx-auto flex max-w-2xl flex-col items-center px-6">
          <h1
            class="pb-3 pt-8 text-center text-[32px] font-bold leading-tight tracking-tight text-slate-900 dark:text-slate-100 md:text-[40px]">
            Email made easy for everyone
          </h1>
          <p
            class="max-w-md pb-8 pt-1 text-center text-base font-normal leading-relaxed text-slate-600 dark:text-slate-400 md:text-lg">
            Manage your inbox, draft perfect replies, and stay organized with your personal
            AI-powered email assistant.
          </p>
          <!-- Action Area -->
          <div class="flex w-full flex-col gap-4 pb-12">
            <button
              class="flex h-14 min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl bg-primary px-5 text-lg font-bold leading-normal tracking-[0.015em] text-white shadow-lg shadow-primary/20 transition-all hover:opacity-90">
              <span class="truncate">Get Started</span>
            </button>
            <button
              class="flex h-14 min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl border-2 border-slate-200 px-5 text-base font-semibold leading-normal text-slate-700 transition-all hover:bg-slate-50 dark:border-slate-800 dark:text-slate-300 dark:hover:bg-slate-800/50">
              <span class="truncate">I already have an account</span>
            </button>
          </div>
        </div>
      </div>
      <!-- Feature Highlights (Subtle) -->
      <div class="mx-auto grid max-w-2xl grid-cols-3 gap-4 px-6 pb-12">
        <div class="flex flex-col items-center text-center">
          <div class="mb-2 flex h-12 w-12 items-center justify-center rounded-full bg-primary/10">
            <span class="material-symbols-outlined text-primary">auto_awesome</span>
          </div>
          <span class="text-xs font-medium text-slate-500">AI Powered</span>
        </div>
        <div class="flex flex-col items-center text-center">
          <div class="mb-2 flex h-12 w-12 items-center justify-center rounded-full bg-primary/10">
            <span class="material-symbols-outlined text-primary">security</span>
          </div>
          <span class="text-xs font-medium text-slate-500">Secure</span>
        </div>
        <div class="flex flex-col items-center text-center">
          <div class="mb-2 flex h-12 w-12 items-center justify-center rounded-full bg-primary/10">
            <span class="material-symbols-outlined text-primary">speed</span>
          </div>
          <span class="text-xs font-medium text-slate-500">Fast Setup</span>
        </div>
      </div>
      <div class="bg-background-light dark:bg-background-dark h-4"></div>
    </div>
  </body>
</html>
