<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#0d59f2',
              'background-light': '#f5f6f8',
              'background-dark': '#101622',
            },
            fontFamily: {
              display: ['Inter', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '0.5rem',
              xl: '0.75rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 48;
        font-size: 32px;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 antialiased dark:text-slate-100">
    <div
      class="mx-auto flex min-h-screen max-w-md flex-col overflow-hidden bg-white shadow-xl dark:bg-slate-900">
      <header
        class="flex items-center justify-between border-b border-slate-100 bg-white p-6 pt-8 dark:border-slate-800 dark:bg-slate-900">
        <div class="flex flex-col">
          <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Good morning,</p>
          <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Alex Rivera</h1>
        </div>
        <div class="flex items-center gap-3">
          <button
            class="relative rounded-full p-2 text-slate-600 transition-colors hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">
            <span class="material-symbols-outlined text-2xl">notifications</span>
            <span class="absolute right-2 top-2 flex h-2.5 w-2.5">
              <span
                class="absolute inline-flex h-full w-full animate-ping rounded-full bg-primary opacity-75"></span>
              <span class="relative inline-flex h-2.5 w-2.5 rounded-full bg-primary"></span>
            </span>
          </button>
          <div
            class="flex size-10 items-center justify-center rounded-full border border-primary/20 bg-primary/10">
            <span class="text-sm font-bold text-primary">AR</span>
          </div>
        </div>
      </header>
      <main class="flex-1 space-y-8 p-6">
        <section>
          <div class="mb-4 flex items-center justify-between">
            <h2 class="text-lg font-semibold tracking-tight">Main Actions</h2>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <button
              class="flex aspect-square flex-col items-start justify-between rounded-xl bg-primary p-5 text-left text-white shadow-lg shadow-primary/20 transition-all hover:brightness-105 active:scale-95">
              <div class="rounded-lg bg-white/20 p-3">
                <span class="material-symbols-outlined">edit_square</span>
              </div>
              <div class="space-y-1">
                <span class="block text-lg font-bold">Compose</span>
                <span class="block text-sm text-white/80">New message</span>
              </div>
            </button>
            <button
              class="dark:hover:bg-slate-750 flex aspect-square flex-col items-start justify-between rounded-xl border border-slate-200 bg-white p-5 text-left transition-all hover:bg-slate-50 active:scale-95 dark:border-slate-700 dark:bg-slate-800">
              <div class="rounded-lg bg-primary/10 p-3">
                <span class="material-symbols-outlined text-primary">inbox</span>
              </div>
              <div class="space-y-1">
                <div class="flex items-center gap-2">
                  <span class="block text-lg font-bold text-slate-900 dark:text-white">Inbox</span>
                  <span class="rounded-full bg-primary px-2 py-0.5 text-[10px] text-white">12</span>
                </div>
                <span class="block text-sm text-slate-500 dark:text-slate-400">View latest</span>
              </div>
            </button>
            <button
              class="dark:hover:bg-slate-750 flex aspect-square flex-col items-start justify-between rounded-xl border border-slate-200 bg-white p-5 text-left transition-all hover:bg-slate-50 active:scale-95 dark:border-slate-700 dark:bg-slate-800">
              <div class="rounded-lg bg-primary/10 p-3">
                <span class="material-symbols-outlined text-primary">description</span>
              </div>
              <div class="space-y-1">
                <span class="block text-lg font-bold text-slate-900 dark:text-white"
                  >Templates</span
                >
                <span class="block text-sm text-slate-500 dark:text-slate-400">Saved drafts</span>
              </div>
            </button>
            <button
              class="dark:hover:bg-slate-750 flex aspect-square flex-col items-start justify-between rounded-xl border border-slate-200 bg-white p-5 text-left transition-all hover:bg-slate-50 active:scale-95 dark:border-slate-700 dark:bg-slate-800">
              <div class="rounded-lg bg-primary/10 p-3">
                <span class="material-symbols-outlined text-primary">send</span>
              </div>
              <div class="space-y-1">
                <span class="block text-lg font-bold text-slate-900 dark:text-white">Sent</span>
                <span class="block text-sm text-slate-500 dark:text-slate-400">Outbox history</span>
              </div>
            </button>
          </div>
        </section>
        <section class="space-y-4">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold tracking-tight">Recent Activity</h2>
            <button class="text-sm font-semibold text-primary">View all</button>
          </div>
          <div class="space-y-3">
            <div
              class="flex items-center gap-4 rounded-xl border border-slate-100 bg-slate-50 p-4 dark:border-slate-800 dark:bg-slate-800/50">
              <div
                class="size-12 flex-shrink-0 overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
                <img
                  class="h-full w-full object-cover"
                  data-alt="Profile photo of Sarah Jenkins"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuAjhKy8xnrFwh9k6xEfJjqNQlGxORZS0m1b1M36kYpiH-ukebZwyF49YLZnHd38IHa3jLBZM0rZlah--gizsNur4-uRHMsjjhirL7lep0nRfj6J1mS3E6bHzQvkeyQ7gBlFx9GAW3yUflJ-p0RxoUpyUjCnJgVLkgWPlwm54YeOzVFaUPwE8v-DGYHdKPKvt8XE9KLJLDUY6zHYV3Dq0fVuQg0xBD-L0DsMg1urVhHv5FOuVbCSruSBej1-b87NV0WDEgYTlhoLJS4" />
              </div>
              <div class="min-w-0 flex-1">
                <div class="flex items-start justify-between">
                  <p class="truncate font-semibold text-slate-900 dark:text-white">Sarah Jenkins</p>
                  <span class="text-[10px] font-medium uppercase tracking-wider text-slate-400"
                    >10:45 AM</span
                  >
                </div>
                <p class="truncate text-sm text-slate-500 dark:text-slate-400">
                  Project Update: Design Review for Mobile app
                </p>
              </div>
            </div>
            <div
              class="flex items-center gap-4 rounded-xl border border-slate-100 bg-slate-50 p-4 opacity-60 dark:border-slate-800 dark:bg-slate-800/50">
              <div
                class="size-12 flex-shrink-0 overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
                <img
                  class="h-full w-full object-cover"
                  data-alt="Profile photo of Mark Thompson"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVxv6tpxVEgSNSTTmv1EBx6Wd30WgrqMssrEOv5JaD9Whn9dctVxM-nrlXGtkILq0XJxVB6ASEnZZvk7nVDPq2IJz_hpek6OY5HehriffTOi-6QHAyj6fZPE2S8qjplKIAr1eKZHQHVk-3aOr4guLHsUCrVQI60WbDbLazKJ-yKpvhL-TjuA-_Aj17RLFUxjPZZ-f_8SVaBM74ybWAr2sq-vcY3SRvrtAh0SlUNyIJ4cWOxRUt92AU9vn9Or7PycjFCsKMvatfwnY" />
              </div>
              <div class="min-w-0 flex-1">
                <div class="flex items-start justify-between">
                  <p class="truncate font-semibold text-slate-900 dark:text-white">Mark Thompson</p>
                  <span class="text-[10px] font-medium uppercase tracking-wider text-slate-400"
                    >Yesterday</span
                  >
                </div>
                <p class="truncate text-sm text-slate-500 dark:text-slate-400">
                  Welcome to the new dashboard interface!
                </p>
              </div>
            </div>
          </div>
        </section>
      </main>
      <nav
        class="border-t border-slate-100 bg-white/80 px-6 py-3 backdrop-blur-md dark:border-slate-800 dark:bg-slate-900/80">
        <div class="mx-auto flex max-w-sm items-center justify-between">
          <a class="flex flex-col items-center gap-1 text-primary" href="#">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Dashboard</span>
          </a>
          <a
            class="flex flex-col items-center gap-1 text-slate-400 transition-colors hover:text-slate-600 dark:hover:text-slate-300"
            href="#">
            <span class="material-symbols-outlined">search</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Search</span>
          </a>
          <a
            class="flex flex-col items-center gap-1 text-slate-400 transition-colors hover:text-slate-600 dark:hover:text-slate-300"
            href="#">
            <span class="material-symbols-outlined">calendar_today</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Events</span>
          </a>
          <a
            class="flex flex-col items-center gap-1 text-slate-400 transition-colors hover:text-slate-600 dark:hover:text-slate-300"
            href="#">
            <span class="material-symbols-outlined">settings</span>
            <span class="text-[10px] font-bold uppercase tracking-wider">Settings</span>
          </a>
        </div>
      </nav>
    </div>
  </body>
</html>
